        - generic [ref=e863]:
          - generic [ref=e864]: "\""
          - paragraph [ref=e865]: Chuck Norris n'est pas simplement un acteur ou un artiste martial. Il est une force de la nature, un phénomène qui défie les lois de la physique, du temps et de la mortalité. Né Carlos Ray Norris dans les plaines de l'Oklahoma, il a conquis les tatamis, les écrans de cinéma et l'imaginaire collectif de l'humanité entière. Six fois champion du monde de karaté, héros de dizaines de films d'action, ranger légendaire du Texas pendant huit saisons, il a forgé un mythe que même Internet n'a pu que célébrer à travers les Chuck Norris Facts. Sa légende ne connaît ni frontières ni limites temporelles. Car Chuck Norris ne vieillit pas — le temps recule devant lui. Il ne meurt pas — la mort elle-même n'ose pas l'approcher. Il est l'alpha et l'oméga, le poing et la sagesse, l'homme et le mythe. Là où d'autres laissent un héritage, Chuck Norris a laissé une ère.
          - generic [ref=e866]: "\""
      - generic [ref=e869]: ★
      - generic [ref=e873]:
